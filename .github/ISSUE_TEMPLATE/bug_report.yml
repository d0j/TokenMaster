name: Bug report
description: Report a reproducible, non-sensitive TokenMaster defect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        TokenMaster is pre-alpha and not released. Never paste credentials, prompts,
        responses, source content, raw JSONL, command output, or absolute user paths.
        Report vulnerabilities through GitHub private vulnerability reporting instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Use a version, full commit ID, or clear local checkpoint.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Rust core/provider/parser
        - Native UI or tray lifecycle
        - Source discovery, parsing, or archive ingest
        - Verification or publication scripts
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide bounded, synthetic steps and inputs only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Use stable codes and privacy-safe diagnostics; redact local paths.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Checks already run
      description: List exact test commands and results.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed credentials, private content, raw logs, and absolute user paths.
          required: true
        - label: This is not an unpatched security vulnerability.
          required: true

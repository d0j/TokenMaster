name: TokenMaster Release Artifact

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package-and-attest:
    if: >-
      github.event_name == 'push' ||
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: windows-2025
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust 1.97.0 for canonical MSVC packaging
        shell: pwsh
        run: rustup toolchain install 1.97.0 --profile minimal --target x86_64-pc-windows-msvc
      - name: Package canonical unsigned artifact
        shell: pwsh
        run: ./scripts/package-product.ps1 -RepositoryRoot $PWD.Path
      - name: Attest canonical unsigned ZIP
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/TokenMaster-*-windows-x64-unsigned.zip
          push-to-registry: false
          create-storage-record: false
      - name: Upload canonical unsigned package and receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tokenmaster-windows-x64-unsigned
          path: |
            dist/TokenMaster-*-windows-x64-unsigned.zip
            dist/TokenMaster-*-windows-x64-unsigned.receipt.json
          if-no-files-found: error
          retention-days: 30
